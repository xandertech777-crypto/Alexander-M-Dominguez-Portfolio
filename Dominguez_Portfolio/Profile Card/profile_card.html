<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Profile</title>
    <link rel="stylesheet" href="style_profile.css">
</head>
<body>
    <div id="profile_card"></div>
    <div class="profile_card">
        <img class="profile-img" src="images/xan.jpg" alt="">
        <h2>Alexander M. Dominguez</h2>
        <p>We Developer | Designer</p>
        <p>"Coding is my passions"</p>
        <div class="social-icons">
            <a href="https://www.facebook.com/xander.maghilum" target="_blank" title="Facebook"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="mailto:xandertech777@gmail.com" title="Email"><img src="images/twitter.png" alt="Email"></a>
            <button class="contact-btn" onclick="openContactModal()" title="Contact Form"><span>📧</span></button>
        </div>
        <a href="about_profile.html" class="btn">About me</a>
    </div>

    <!-- Contact Modal -->
    <div id="contactModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeContactModal()">&times;</span>
            <h2>Contact Me</h2>
            <form id="contactForm" onsubmit="sendEmail(event)">
                <input type="text" id="name" name="name" placeholder="Your Name" required>
                <input type="tel" id="phone" name="phone" placeholder="Your Phone Number" required>
                <textarea id="message" name="message" placeholder="Your Message" rows="5" required></textarea>
                <button type="submit" class="send-btn">Send</button>
            </form>
        </div>
    </div>

    <script>
        function openContactModal() {
            document.getElementById('contactModal').style.display = 'block';
        }

        function closeContactModal() {
            document.getElementById('contactModal').style.display = 'none';
        }

        function sendEmail(event) {
            event.preventDefault();
            var name = document.getElementById('name').value;
            var phone = document.getElementById('phone').value;
            var message = document.getElementById('message').value;
            
            var mailtoLink = 'mailto:xandertech777@gmail.com?subject=Contact from ' + encodeURIComponent(name) + '&body=' + encodeURIComponent('Name: ' + name + '\nPhone: ' + phone + '\n\nMessage:\n' + message);
            
            window.location.href = mailtoLink;
            closeContactModal();
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            var modal = document.getElementById('contactModal');
            if (event.target == modal) {
                closeContactModal();
            }
        }
    </script>
</body>
</html>
