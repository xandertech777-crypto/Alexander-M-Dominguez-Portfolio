<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta tags for character encoding and responsive design -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempConvert</title>
    
    <!-- Link to custom CSS stylesheet -->
    <link rel="stylesheet" href="temperature.css">
    
    <!-- Link to Boxicons library for thermometer and weather icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <!-- Main converter card container -->
    <div class="converter-card">
        
        <!-- Header section with title and toggle buttons -->
        <div class="card-header">
            <!-- Thermometer icon -->
            <i class='bx bx-thermometer converter-icon'></i>
            
            <!-- Main title -->
            <h2>Temperature Converter</h2>
            
            <!-- Toggle buttons to switch between Celsius and Fahrenheit primary input -->
            <div class="toggle-buttons">
                <button class="toggle-btn active" id="toggleC" data-mode="C">°C</button>
                <button class="toggle-btn" id="toggleF" data-mode="F">°F</button>
            </div>
        </div>
        
        <!-- Status display showing temperature category (e.g., Cold, Hot, Normal) -->
        <div class="temp-status" id="tempStatus">Enter a value</div>
        
        <!-- Fahrenheit input group -->
        <div class="input-group">
            <label>Fahrenheit</label>
            <input type="number" id="fahrenheit" placeholder="Enter °F">
        </div>

        <!-- Equals separator between inputs -->
        <div class="equals">=</div>

        <!-- Celsius input group -->
        <div class="input-group">
            <label>Celsius</label>
            <input type="number" id="celsius" placeholder="Enter °C">
        </div>
    </div> <!-- end converter-card -->

    <!-- Floating weather icon that changes based on temperature -->
    <!-- Icon changes: snowflake (cold), cloud (cool), sun (warm/hot) -->
    <div class="weather-icon"><i class="bx"></i></div>

    <!-- Link to JavaScript for interactivity -->
    <script src="temperature.js"></script>
</body>
</html>
